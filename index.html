                                <button onClick={() => setActiveTab('batches')} className={`flex-shrink-0 flex items-center gap-3 p-3 rounded-lg transition ${activeTab === 'batches' ? 'bg-[#156b41]' : 'hover:bg-[#115735]'}`}>

                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                                            <div className="bg-green-100 p-4 rounded-xl text-green-600"><i className="fa-solid fa-money-bill-wave text-2xl"></i></div>

                                        </div>
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">

                                            <div><p className="text-gray-500 text-sm font-bold">متبقي في الدفعة</p><p className="text-2xl font-black">{currentBatch.total - currentBatch.booked}</p></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'inventory' && (
                                <div>
                                    <h2 className="text-2xl font-black text-gray-800 mb-6">إدارة المخزون والأسعار</h2>

                                        <table className="w-full text-right min-w-[600px]">
                                            <thead className="bg-gray-50 text-gray-600 text-sm border-b">
                                                <tr>
                                                    <th className="p-4 font-bold">المنتج</th>
                                                    <th className="p-4 font-bold text-center">السعر (ج.م)</th>
                                                    <th className="p-4 font-bold text-center">المخزون المتاح</th>
                                                    <th className="p-4 font-bold">الحالة</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {products.map(product => (
                                                    <tr key={product.id} className="hover:bg-gray-50 transition">
                                                        <td className="p-4 font-bold text-gray-800">{product.name} <span className="text-xs text-gray-400 block font-normal mt-1">{product.weight}</span></td>
                                                        <td className="p-4 text-center">
                                                            <input type="number" value={product.price} onChange={(e) => handleUpdatePrice(product.id, e.target.value)}
                                                                className="border border-gray-300 w-20 p-2 rounded-lg text-center outline-none focus:border-brand font-bold bg-white" />
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <input type="number" value={product.stock} onChange={(e) => handleUpdateStock(product.id, e.target.value)}

                                                        </td>
                                                        <td className="p-4">
                                                            {product.stock > 10 ? <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap">متوفر</span> : 
                                                            product.stock > 0 ? <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap">قارب على الانتهاء</span> : 
                                                            <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap">غير متوفر</span>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'orders' && (
                                <div>
                                    <h2 className="text-2xl font-black text-gray-800 mb-6">الطلبات الواردة</h2>
                                    {orders.length === 0 ? (
                                        <div className="bg-white p-12 text-center rounded-2xl shadow-sm text-gray-400 border border-gray-100">
                                            <i className="fa-solid fa-box-open text-5xl mb-4 opacity-30 block"></i>
                                            <p className="font-bold text-lg">لا توجد طلبات جديدة.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {orders.map(order => (
                                                <div key={order.id} className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between md:items-center gap-4">
                                                    <div>
                                                        <div className="flex flex-wrap items-center gap-3 mb-3">
                                                            <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-md font-black text-xs tracking-wider">#{order.id}</span>
                                                            <span className="font-bold text-gray-800 text-lg">{order.customer}</span>
                                                            <a href={`tel:${order.phone}`} className="text-sm font-bold text-blue-500 hover:underline" dir="ltr"><i className="fa-solid fa-phone text-xs"></i> {order.phone}</a>
                                                        </div>
                                                        <p className="text-sm text-gray-600 mb-2 font-semibold bg-gray-50 inline-block px-3 py-1 rounded-lg border border-gray-200">
                                                            <i className="fa-solid fa-location-dot text-brand ml-1"></i> {order.region} &nbsp;|&nbsp; <i className="fa-regular fa-calendar ml-1 text-brand"></i> {order.date}
                                                        </p>
                                                        <p className="text-sm font-bold text-brand mt-2 flex items-start gap-2">
                                                            <i className="fa-solid fa-bag-shopping mt-1"></i>
                                                            <span>{order.items.map(i => `${i.quantity}x ${i.name}`).join(' ، ')}</span>
                                                        </p>
                                                    </div>
                                                    <div className="text-right md:text-left flex flex-row md:flex-col justify-between items-center md:items-end border-t md:border-0 pt-4 md:pt-0">
                                                        <p className="text-2xl font-black text-brand md:mb-3">{order.total} <span className="text-sm">ج.م</span></p>
                                                        <select className="border-2 border-gray-200 rounded-lg p-2 text-sm font-bold outline-none focus:border-brand cursor-pointer">
                                                            <option>قيد المراجعة</option>
                                                            <option>جاري التجهيز</option>
                                                            <option>تم التسليم</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'batches' && (
                                <div>
                                    <h2 className="text-2xl font-black text-gray-800 mb-6">إدارة الدفعة الحالية</h2>
                                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 max-w-xl">
                                        <h3 className="text-xl font-bold mb-6 text-brand border-b pb-3"><i className="fa-solid fa-calendar-check"></i> {currentBatch.name}</h3>
                                        <div className="space-y-5">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-sm font-bold text-gray-600 mb-2">العدد الكلي للدفعة</label>
                                                    <input type="number" value={currentBatch.total} onChange={e => setCurrentBatch({...currentBatch, total: parseInt(e.target.value)})} className="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-brand outline-none font-bold text-lg text-center" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-bold text-gray-600 mb-2">المحجوز حتى الآن</label>
                                                    <input type="number" value={currentBatch.booked} onChange={e => setCurrentBatch({...currentBatch, booked: parseInt(e.target.value)})} className="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-brand outline-none font-bold text-lg text-center" />
                                                </div>
                                            </div>
                                            <div className="bg-amber-50 p-4 rounded-xl border border-amber-100 flex justify-between items-center mt-6">
                                                <span className="font-bold text-amber-900 text-lg">المتبقي للحجز:</span>
                                                <span className="text-3xl font-black text-red-600">{currentBatch.total - currentBatch.booked}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // --- إعدادات المودال و Toasts و Drawer (تُرسم فوق كل شيء) ---
            return (
                <React.Fragment>
                    {/* View Switcher */}
                    {view === 'checkout' ? <CheckoutView /> : view === 'admin' ? <AdminDashboard /> : <StoreFront />}

                    {/* Toast Notification */}
                    {toast.show && (
                        <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl font-bold text-white flex items-center gap-2 transition-all duration-300 animate-bounce ${toast.type === 'error' ? 'bg-red-500' : 'bg-green-600'}`}>
                            <i className={`fa-solid ${toast.type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} text-lg`}></i>
                            {toast.message}
                        </div>
                    )}

                    {/* Admin Login Modal */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[80] flex items-center justify-center px-4 bg-black/60 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl relative">
                                <button onClick={() => setShowAdminLogin(false)} className="absolute top-5 right-5 text-gray-400 hover:text-red-500 transition"><i className="fa-solid fa-xmark text-xl"></i></button>
                                <div className="text-center mb-6">
                                    <div className="bg-brand w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-white shadow-lg">
                                        <i className="fa-solid fa-lock text-2xl"></i>
                                    </div>
                                    <h3 className="text-xl font-black text-gray-800">تسجيل دخول الإدارة</h3>
                                    <p className="text-sm text-gray-500 mt-2">للتجربة اكتب: 1234</p>
                                </div>
                                <input 
                                    type="password" 
                                    placeholder="••••"
                                    value={adminPass}
                                    onChange={(e) => setAdminPass(e.target.value)}
                                    className="w-full border-2 border-gray-200 rounded-xl p-4 mb-5 text-center text-2xl tracking-widest focus:ring-0 focus:border-brand outline-none transition font-bold"
                                    dir="ltr"
                                />
                                <button 
                                    onClick={() => {
                                        if (adminPass === '1234') {
                                            setShowAdminLogin(false);
                                            setAdminPass('');
                                            setView('admin');
                                        } else {
                                            showToast('كلمة المرور خاطئة', 'error');
                                        }
                                    }}
                                    className="w-full bg-brand text-white py-4 rounded-xl font-bold text-lg hover:bg-green-900 transition shadow-lg"
                                >
                                    دخول
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Quick Order Modal */}
                    {quickOrderProduct && (
                        <div className="fixed inset-0 z-[80] flex items-end md:items-center justify-center bg-black/60 backdrop-blur-sm md:p-4">
                            <div className="bg-white rounded-t-3xl md:rounded-3xl w-full max-w-md shadow-2xl overflow-hidden animate-slideUp">
                                <div className="p-4 bg-gray-50 flex justify-between items-center border-b border-gray-200">
                                    <h3 className="font-black text-brand flex items-center gap-2 text-lg"><i className="fa-solid fa-bolt text-gold"></i> طلب سريع</h3>
                                    <button onClick={() => setQuickOrderProduct(null)} className="text-gray-400 hover:text-red-500 w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50 transition"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <div className="p-6">
                                    <div className="flex items-center gap-4 mb-6 bg-amber-50 p-4 rounded-2xl border border-amber-100">
                                        <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center border border-amber-200 shadow-sm flex-shrink-0">
                                            <i className="fa-solid fa-box text-gold"></i>
                                        </div>
                                        <div className="flex-1">
                                            <h4 className="font-black text-lg text-gray-800">{quickOrderProduct.name}</h4>
                                            <p className="text-sm font-bold text-brand mt-1">{quickOrderProduct.price} ج.م <span className="text-gray-500 font-normal">/ للقطعة</span></p>
                                        </div>
                                    </div>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        const form = e.target;
                                        const qty = form.qty.value;
                                        const name = form.customerName.value;
                                        const phone = form.phone.value;
                                        const orderCode = `QO-${Math.floor(Math.random() * 10000)}`;
                                        
                                        let waText = `*طلب سريع من موقع سمان ههيا* ⚡\nكود الطلب: #${orderCode}\n`;
                                        waText += `وقت الطلب: ${new Date().toLocaleString('ar-EG')}\n\n`;
                                        waText += `*المنتج:* ${qty}x ${quickOrderProduct.name}\n`;
                                        waText += `*الإجمالي:* ${qty * quickOrderProduct.price} ج.م\n\n`;
                                        waText += `*الاسم للاستيكر:* ${name}\n`;
                                        waText += `*الرقم:* ${phone}\n`;
                                        
                                        const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waText)}`;
                                        window.open(waLink, '_blank');
                                        
                                        setQuickOrderProduct(null);
                                        showToast('جاري تحويلك للواتساب...');
                                    }}>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">الكمية المطلوبة</label>
                                                <div className="flex items-center gap-0">
                                                    <input name="qty" type="number" min="1" max={quickOrderProduct.stock} defaultValue="1" required className="w-full border-2 border-gray-200 rounded-xl p-3 focus:ring-0 focus:border-gold outline-none text-center font-bold text-lg" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">الاسم (يُطبع على الاستيكر)</label>
                                                <input name="customerName" type="text" required placeholder="الاسم ثلاثي" className="w-full border-2 border-gray-200 rounded-xl p-3 focus:ring-0 focus:border-gold outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">رقم الموبايل / الواتساب</label>
                                                <input name="phone" type="tel" required placeholder="01X..." dir="ltr" className="w-full border-2 border-gray-200 rounded-xl p-3 text-right focus:ring-0 focus:border-gold outline-none" />
                                            </div>
                                            <button type="submit" className="w-full bg-gold text-white py-4 rounded-xl font-bold text-lg hover:bg-yellow-600 shadow-xl transition mt-6 flex justify-center items-center gap-2">
                                                <i className="fa-brands fa-whatsapp text-2xl"></i> إرسال الطلب فوراً
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Cart Drawer */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[70] flex justify-end">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-slideInRight">
                                <div className="p-5 border-b flex justify-between items-center bg-gray-50">
                                    <h2 className="text-xl font-black text-brand flex items-center gap-2">
                                        <i className="fa-solid fa-bag-shopping"></i> سلة الطلبات
                                    </h2>
                                    <button onClick={() => setIsCartOpen(false)} className="p-2 text-gray-400 hover:text-red-500 bg-white rounded-full shadow-sm">
                                        <i className="fa-solid fa-xmark text-lg"></i>
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-5 no-scrollbar">
                                    {cart.length === 0 ? (
                                        <div className="text-center text-gray-400 mt-32 flex flex-col items-center">
                                            <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-6">
                                                <i className="fa-solid fa-basket-shopping text-5xl opacity-30"></i>
                                            </div>
                                            <p className="font-bold text-lg">السلة فارغة حالياً</p>
                                            <button onClick={() => setIsCartOpen(false)} className="mt-6 text-brand font-bold underline">تصفح المنتجات</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {cart.map(item => (
                                                <div key={item.id} className="flex items-center justify-between border-2 border-gray-100 p-4 rounded-2xl shadow-sm bg-white">
                                                    <div className="flex-1">
                                                        <h4 className="font-bold text-gray-800 text-lg mb-1">{item.name}</h4>
                                                        <p className="text-sm font-bold text-gold">{item.price} ج.م</p>
                                                    </div>
                                                    <div className="flex items-center gap-3 bg-gray-50 rounded-xl p-1.5 border border-gray-200">
                                                        <button onClick={() => updateQuantity(item.id, -1)} className="w-8 h-8 flex items-center justify-center bg-white rounded-lg shadow-sm text-gray-600 hover:text-red-500 hover:bg-red-50 transition"><i className="fa-solid fa-minus text-xs"></i></button>
                                                        <span className="font-black w-6 text-center text-lg">{item.quantity}</span>
                                                        <button onClick={() => updateQuantity(item.id, 1)} className="w-8 h-8 flex items-center justify-center bg-brand text-white rounded-lg shadow-sm hover:bg-green-900 transition"><i className="fa-solid fa-plus text-xs"></i></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {cart.length > 0 && (
                                    <div className="p-5 border-t bg-white shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-10 relative">
                                        <div className="flex justify-between items-center mb-5 bg-gray-50 p-4 rounded-xl">
                                            <span className="font-bold text-gray-600 text-lg">الإجمالي:</span>
                                            <span className="font-black text-brand text-3xl">{cartTotal} <span className="text-base font-bold text-gray-500">ج.م</span></span>
                                        </div>
                                        <button 
                                            onClick={() => { setIsCartOpen(false); setView('checkout'); }}
                                            className="w-full bg-brand text-white py-4 rounded-xl font-bold text-lg hover:bg-green-900 shadow-xl transition flex justify-center items-center gap-2 transform hover:-translate-y-1"
                                        >
                                            استكمال الطلب <i className="fa-solid fa-arrow-left"></i>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </React.Fragment>
            );
        }

        // تشغيل التطبيق
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
