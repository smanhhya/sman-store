                        const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waText)}`;
                        window.open(waLink, '_blank');
                        
                        setQuickOrderProduct(null);
                        showToast('جاري تحويلك للواتساب...');
                        }}>
                        <div className="space-y-4">
                            <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">الكمية المطلوبة</label>
                            <input name="qty" type="number" min="1" max={quickOrderProduct.stock} defaultValue="1" required className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-[#cfa45d] outline-none" />
                            </div>
                            <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">الاسم (للاستيكر)</label>
                            <input name="customerName" type="text" required placeholder="الاسم ثلاثي" className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-[#cfa45d] outline-none" />
                            </div>
                            <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">رقم الموبايل / الواتساب</label>
                            <input name="phone" type="tel" required placeholder="01X..." className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-[#cfa45d] outline-none" />
                            </div>
                            <button type="submit" className="w-full bg-[#cfa45d] text-white py-4 rounded-xl font-bold text-lg hover:bg-[#b58c49] shadow-lg transition mt-4 flex justify-center items-center gap-2">
                            <Phone size={20} /> إرسال الطلب واتساب
                            </button>
                        </div>
                        </form>
                    </div>
                </div>
                </div>
            )}

            {isCartOpen && (
                <div className="fixed inset-0 z-50 flex justify-end">
                <div className="absolute inset-0 bg-black/50" onClick={() => setIsCartOpen(false)}></div>
                <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col">
                    <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                    <h2 className="text-xl font-bold text-[#0f4c2e] flex items-center gap-2">
                        <ShoppingBag /> سلة الطلبات
                    </h2>
                    <button onClick={() => setIsCartOpen(false)} className="p-2 text-gray-400 hover:text-red-500">
                        <X size={24} />
                    </button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4">
                    {cart.length === 0 ? (
                        <div className="text-center text-gray-400 mt-20">
                        <ShoppingBag size={64} className="mx-auto mb-4 opacity-20" />
                        <p>السلة فارغة حالياً</p>
                        </div>
                    ) : (
                        <div className="space-y-4">
                        {cart.map(item => (
                            <div key={item.id} className="flex items-center justify-between border border-gray-100 p-3 rounded-xl shadow-sm">
                            <div className="flex-1">
                                <h4 className="font-bold text-gray-800">{item.name}</h4>
                                <p className="text-sm text-[#cfa45d]">{item.price} ج.م</p>
                            </div>
                            <div className="flex items-center gap-3 bg-gray-50 rounded-lg p-1 border border-gray-200">
                                <button onClick={() => updateQuantity(item.id, -1)} className="p-1 hover:bg-white rounded shadow-sm text-gray-600"><Minus size={16} /></button>
                                <span className="font-bold w-6 text-center">{item.quantity}</span>
                                <button onClick={() => updateQuantity(item.id, 1)} className="p-1 hover:bg-white rounded shadow-sm text-[#0f4c2e]"><Plus size={16} /></button>
                            </div>
                            </div>
                        ))}
                        </div>
                    )}
                    </div>

                    {cart.length > 0 && (
                    <div className="p-4 border-t bg-gray-50">
                        <div className="flex justify-between items-center mb-4 text-lg">
                        <span className="font-bold text-gray-600">الإجمالي:</span>
                        <span className="font-black text-[#0f4c2e] text-2xl">{cartTotal} ج.م</span>
                        </div>
                        <button 
                        onClick={() => { setIsCartOpen(false); setView('checkout'); }}
                        className="w-full bg-[#0f4c2e] text-white py-4 rounded-xl font-bold text-lg hover:bg-[#0a3621] shadow-lg transition"
                        >
                        استكمال الطلب
                        </button>
                    </div>
                    )}
                </div>
                </div>
            )}
            </div>
        );

        const renderCheckoutView = () => {
            const handleOrder = (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = {
                name: form.customerName.value,
                phone: form.phone.value,
                region: form.region.value,
                date: form.date.value,
                notes: form.notes.value
            };

            const orderCode = `SH-${Math.floor(Math.random() * 10000)}`;
            
            const newOrder = {
                id: orderCode,
                customer: formData.name,
                phone: formData.phone,
                region: formData.region,
                date: formData.date,
                items: cart,
                total: cartTotal,
                status: 'جديد',
                createdAt: new Date().toISOString()
            };
            setOrders([newOrder, ...orders]);

            const updatedProducts = products.map(p => {
                const inCart = cart.find(c => c.id === p.id);
                if (inCart) return { ...p, stock: p.stock - inCart.quantity };
                return p;
            });
            setProducts(updatedProducts);

            const totalItemsCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            let waText = `*طلب جديد من موقع سمان ههيا* 👑\nكود الطلب: #${orderCode}\n`;
            waText += `وقت الطلب: ${new Date().toLocaleString('ar-EG')}\n\n`;
            waText += `*المنتجات (${totalItemsCount} قطع):*\n`;
            cart.forEach(item => {
                waText += `▫️ ${item.quantity}x ${item.name}\n`;
            });
            waText += `\n*الإجمالي:* ${cartTotal} ج.م\n`;
            waText += `\n*بيانات العميل:*\nالاسم (للاستيكر): ${formData.name}\nالرقم: ${formData.phone}\nالمنطقة: ${formData.region}\nموعد الاستلام: ${formData.date}\n`;
            if (formData.notes) waText += `ملاحظات: ${formData.notes}\n`;

            const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waText)}`;
            window.open(waLink, '_blank');

            setCart([]);
            setView('store');
            showToast('جاري تحويلك للواتساب لإرسال الطلب...');
            };

            return (
            <div className="min-h-screen bg-gray-50 py-10 font-sans" dir="rtl">
                <div className="container mx-auto px-4 max-w-2xl">
                <button onClick={() => setView('store')} className="text-gray-500 mb-6 flex items-center gap-2 hover:text-[#0f4c2e]">
                    الرجوع للمتجر
                </button>

                <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                    <h2 className="text-2xl font-bold text-[#0f4c2e] mb-6 border-b pb-4">تأكيد الطلب</h2>
                    
                    <form onSubmit={handleOrder} className="space-y-4">
                    <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1">الاسم الكريم (للاستيكر)</label>
                        <input name="customerName" required type="text" className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-[#0f4c2e] outline-none" placeholder="الاسم ثلاثي" />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1">رقم الموبايل / الواتساب</label>
                        <input name="phone" required type="tel" className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-[#0f4c2e] outline-none" placeholder="01X..." />
                        </div>
                        <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1">المنطقة</label>
                        <input name="region" required type="text" className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-[#0f4c2e] outline-none" placeholder="مثال: الزقازيق، ههيا..." />
                        </div>
                    </div>
                    <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1">موعد الاستلام المفضل</label>
                        <input name="date" required type="date" className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-[#0f4c2e] outline-none" />
                    </div>
                    <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1">ملاحظات إضافية (اختياري)</label>
                        <textarea name="notes" className="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-[#0f4c2e] outline-none h-24" placeholder="طريقة تقطيع، تجهيز معين..." />
                    </div>

                    <div className="bg-gray-50 p-4 rounded-xl mt-6 border border-gray-200">
                        <h3 className="font-bold text-gray-800 mb-2">ملخص الطلب:</h3>
                        <ul className="text-sm text-gray-600 mb-3 space-y-1">
                        {cart.map(item => (
                            <li key={item.id} className="flex justify-between">
                            <span>{item.quantity}x {item.name}</span>
                            <span>{(item.price || 0) * item.quantity} ج</span>
                            </li>
                        ))}
                        </ul>
                        <div className="flex justify-between items-center border-t pt-2 mt-2 font-bold text-lg">
                        <span>الإجمالي:</span>
                        <span className="text-[#0f4c2e]">{cartTotal} ج.م</span>
                        </div>
                    </div>

                    <button type="submit" className="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg transition flex items-center justify-center gap-2 mt-6">
                        إرسال الطلب عبر واتساب
                    </button>
                    </form>
                </div>
                </div>
            </div>
            );
        };

        const renderAdminDashboard = () => {
            const [activeTab, setActiveTab] = React.useState('overview');

            const handleUpdateStock = (id, val) => {
            const newStock = val === '' ? '' : parseInt(val, 10);
            setProducts(products.map(p => p.id === id ? { ...p, stock: newStock } : p));
            };

            const handleUpdatePrice = (id, val) => {
            const newPrice = val === '' ? '' : parseFloat(val);
            setProducts(products.map(p => p.id === id ? { ...p, price: newPrice } : p));
            };

            return (
            <div className="min-h-screen bg-gray-100 font-sans flex" dir="rtl">
                <div className="w-64 bg-[#0f4c2e] text-white p-6 flex flex-col hidden md:flex shadow-2xl z-10">
                <div className="flex items-center gap-3 mb-10">
                    <img src={LOGO_URL} alt="سمان ههيا" className="h-10 w-10 bg-white rounded-full p-1" />
                    <h2 className="text-xl font-bold text-[#cfa45d]">لوحة التحكم</h2>
                </div>
                <nav className="space-y-2 flex-1">
                    <button onClick={() => setActiveTab('overview')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition ${activeTab === 'overview' ? 'bg-[#156b41]' : 'hover:bg-[#115735]'}`}>
                    <LayoutDashboard size={20} /> نظرة عامة
                    </button>
                    <button onClick={() => setActiveTab('orders')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition ${activeTab === 'orders' ? 'bg-[#156b41]' : 'hover:bg-[#115735]'}`}>
                    <ShoppingBag size={20} /> الطلبات {orders.length > 0 && <span className="bg-red-500 px-2 py-0.5 rounded-full text-xs mr-auto">{orders.length}</span>}
                    </button>
                    <button onClick={() => setActiveTab('inventory')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition ${activeTab === 'inventory' ? 'bg-[#156b41]' : 'hover:bg-[#115735]'}`}>
                    <Package size={20} /> المخزون والأسعار
                    </button>
                    <button onClick={() => setActiveTab('batches')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition ${activeTab === 'batches' ? 'bg-[#156b41]' : 'hover:bg-[#115735]'}`}>
                    <AlertCircle size={20} /> إدارة الدفعات
                    </button>
                </nav>
                <button onClick={() => setView('store')} className="mt-auto flex items-center gap-3 p-3 text-red-300 hover:bg-red-900/30 rounded-lg transition">
                    <X size={20} /> العودة للمتجر
                </button>
                </div>

                <div className="flex-1 p-8 overflow-y-auto">
                {activeTab === 'overview' && (
                    <div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">نظرة عامة</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div className="flex items-center gap-4">
                            <div className="bg-green-100 p-3 rounded-lg text-green-600"><TrendingUp size={24} /></div>
                            <div><p className="text-gray-500 text-sm">مبيعات اليوم</p><p className="text-2xl font-bold">{orders.reduce((acc, curr) => acc + curr.total, 0)} ج.م</p></div>
                        </div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-100 p-3 rounded-lg text-blue-600"><ShoppingBag size={24} /></div>
                            <div><p className="text-gray-500 text-sm">الطلبات الجديدة</p><p className="text-2xl font-bold">{orders.length}</p></div>
                        </div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div className="flex items-center gap-4">
                            <div className="bg-amber-100 p-3 rounded-lg text-amber-600"><AlertCircle size={24} /></div>
                            <div><p className="text-gray-500 text-sm">متبقي في الدفعة</p><p className="text-2xl font-bold">{(currentBatch.total || 0) - (currentBatch.booked || 0)}</p></div>
                        </div>
                        </div>
                    </div>
                    </div>
                )}

                {activeTab === 'inventory' && (
                    <div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">إدارة المخزون والأسعار</h2>
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <table className="w-full text-right">
                        <thead className="bg-gray-50 text-gray-600 text-sm">
                            <tr>
                            <th className="p-4 font-bold">المنتج</th>
                            <th className="p-4 font-bold">السعر (ج.م)</th>
                            <th className="p-4 font-bold">المخزون المتاح</th>
                            <th className="p-4 font-bold">الحالة</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                            {products.map(product => (
                            <tr key={product.id} className="hover:bg-gray-50 transition">
                                <td className="p-4 font-bold text-gray-800">{product.name} <span className="text-xs text-gray-400 block font-normal">{product.weight}</span></td>
                                <td className="p-4">
                                <input type="number" value={product.price} onChange={(e) => handleUpdatePrice(product.id, e.target.value)}
                                    className="border border-gray-300 w-24 p-2 rounded-lg text-center outline-none focus:border-[#0f4c2e]" />
                                </td>
                                <td className="p-4">
                                <input type="number" value={product.stock} onChange={(e) => handleUpdateStock(product.id, e.target.value)}
                                    className="border border-gray-300 w-24 p-2 rounded-lg text-center outline-none focus:border-[#0f4c2e]" />
                                </td>
                                <td className="p-4">
                                {product.stock > 10 ? <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">متوفر</span> : 
                                product.stock > 0 ? <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-bold">قارب على الانتهاء</span> : 
                                <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">غير متوفر</span>}
                                </td>
                            </tr>
                            ))}
                        </tbody>
                        </table>
                    </div>
                    </div>
                )}

                {activeTab === 'orders' && (
                    <div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">الطلبات الواردة</h2>
                    {orders.length === 0 ? (
                        <div className="bg-white p-10 text-center rounded-2xl shadow-sm text-gray-500">لا توجد طلبات جديدة.</div>
                    ) : (
                        <div className="space-y-4">
                        {orders.map(order => (
                            <div key={order.id} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold text-xs">كود: {order.id}</span>
                                <span className="font-bold text-gray-800 text-lg">{order.customer}</span>
                                <span className="text-sm text-gray-500">{order.phone}</span>
                                </div>
                                <p className="text-sm text-gray-600 mb-2">📍 {order.region} | 📅 تسليم: {order.date}</p>
                                <p className="text-sm font-semibold text-[#0f4c2e]">الطلب: {order.items.map(i => `${i.quantity}x ${i.name}`).join(' ، ')}</p>
                            </div>
                            <div className="text-left">
                                <p className="text-xl font-black text-[#0f4c2e] mb-2">{order.total} ج.م</p>
                                <select className="border border-gray-300 rounded-lg p-2 text-sm bg-gray-50 outline-none">
                                <option>جديد</option>
                                <option>جاري التجهيز</option>
                                <option>تم التسليم</option>
                                </select>
                            </div>
                            </div>
                        ))}
                        </div>
                    )}
                    </div>
                )}

                {activeTab === 'batches' && (
                    <div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">إدارة الدفعة الحالية</h2>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-md">
                        <h3 className="text-lg font-bold mb-4">{currentBatch.name}</h3>
                        <div className="space-y-4">
                            <div>
                            <label className="block text-sm text-gray-600 mb-1">العدد الكلي للدفعة</label>
                            <input type="number" value={currentBatch.total} onChange={e => setCurrentBatch({...currentBatch, total: e.target.value === '' ? '' : parseInt(e.target.value)})} className="w-full border p-2 rounded outline-none focus:border-[#0f4c2e]" />
                            </div>
                            <div>
                            <label className="block text-sm text-gray-600 mb-1">المحجوز حتى الآن</label>
                            <input type="number" value={currentBatch.booked} onChange={e => setCurrentBatch({...currentBatch, booked: e.target.value === '' ? '' : parseInt(e.target.value)})} className="w-full border p-2 rounded outline-none focus:border-[#0f4c2e]" />
                            </div>
                            <div className="pt-4 border-t">
                            <p className="font-bold text-lg">المتبقي للحجز: <span className="text-red-500">{(currentBatch.total || 0) - (currentBatch.booked || 0)}</span></p>
                            </div>
                        </div>
                    </div>
                    </div>
                )}
                </div>
            </div>
            );
        };

        if (view === 'checkout') return renderCheckoutView();
        if (view === 'admin') return renderAdminDashboard();
        return renderStoreFront();
        }

        // --- تشغيل التطبيق ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
