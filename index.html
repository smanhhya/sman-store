<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سمان ههيا | صحي وطازة</title>
    
    <!-- تحميل مكتبة React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- تحميل Babel لتشغيل الكود داخل المتصفح -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- تحميل Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- خط القاهرة من جوجل ليكون شكل الموقع أنيق -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- الأيقونات ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const ShoppingBag = (p) => <IconWrapper {...p}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></IconWrapper>;
        const Phone = (p) => <IconWrapper {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconWrapper>;
        const Star = (p) => <IconWrapper {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;
        const Clock = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconWrapper>;
        const CheckCircle = (p) => <IconWrapper {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const ShieldCheck = (p) => <IconWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></IconWrapper>;
        const X = (p) => <IconWrapper {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
        const Plus = (p) => <IconWrapper {...p}><path d="M5 12h14"/><path d="M12 5v14"/></IconWrapper>;
        const Minus = (p) => <IconWrapper {...p}><path d="M5 12h14"/></IconWrapper>;
        const LayoutDashboard = (p) => <IconWrapper {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconWrapper>;
        const Package = (p) => <IconWrapper {...p}><line x1="16.5" x2="7.5" y1="9.4" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></IconWrapper>;
        const TrendingUp = (p) => <IconWrapper {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></IconWrapper>;
        const AlertCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconWrapper>;
        const Lock = (p) => <IconWrapper {...p}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconWrapper>;
        const Zap = (p) => <IconWrapper {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconWrapper>;

        // --- البيانات الأساسية المستوردة من الموقع القديم ---
        const WEB3FORMS_ACCESS_KEY = "d8e4b3fe-018c-4c39-b15f-191ccc7cf10c";
        const WHATSAPP_NUMBER = "201208027294"; 
        
        const deliveryZones = [
            { id: 'z1', name: 'ههيا', price: 15 },
            { id: 'z2', name: 'الزقازيق', price: 25 },
            { id: 'other', name: 'مكان آخر', price: 0 }
        ];

        const initialProducts = [
            { id: 'super', name: 'طبق سوبر', weight: '300-350 جم', price: 100, stock: 50, image: 'super.png', description: 'أحجام ممتازة ومغذية، جاهزة للطبخ فوراً.', isLimited: false },
            { id: 'jumbo', name: 'طبق جامبو', weight: '350-400 جم', price: 110, stock: 30, image: 'jumbo.png', description: 'حجم كبير، مناسب جداً للعزومات والشوي.', isLimited: false },
            { id: 'special', name: 'طبق سبشيال', weight: '400-450 جم', price: 120, stock: 15, image: 'special.png', description: 'أحجام نادرة ومختارة بعناية فائقة.', isLimited: true },
            { id: 'superspecial', name: 'سوبر سبشيال', weight: '450-500 جم', price: 130, stock: 5, image: 'superspecial.png', description: 'أكبر حجم متاح لدينا، كميات محدودة جداً.', isLimited: true },
            { id: 'eggs', name: 'طبق بيض سمان', weight: 'طبق 18 بيضة', price: 50, stock: 100, image: 'eggs.jpg', description: 'طازج يومياً، مليء بالفيتامينات، مفيد جداً للأطفال.', isLimited: false },
            { id: 'chicks', name: 'كتاكيت سمان', weight: 'بالكتكوت', price: 8, stock: 500, image: 'chicks.jpg', description: 'لأصحاب التربية والمزارع.', isLimited: false },
        ];

        function App() {
            const [view, setView] = useState('store');
            const [products, setProducts] = useState(initialProducts);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [quickOrderProduct, setQuickOrderProduct] = useState(null);
            
            // استرجاع السلة من التخزين المحلي إن وجدت
            useEffect(() => {
                const saved = localStorage.getItem('sman_new_cart');
                if(saved) setCart(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('sman_new_cart', JSON.stringify(cart));
            }, [cart]);

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
            };

            const addToCart = (product) => {
                if (product.stock <= 0) {
                    showToast('عفواً، الكمية نفذت', 'error'); return;
                }
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    if (existing.quantity >= product.stock) { showToast('وصلت للحد الأقصى المتاح', 'error'); return; }
                    setCart(cart.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item));
                } else {
                    setCart([...cart, { ...product, quantity: 1 }]);
                }
                showToast('تمت إضافة المنتج للسلة بنجاح');
            };

            const updateQuantity = (id, delta) => {
                setCart(cart.map(item => {
                    if (item.id === id) {
                        const newQ = item.quantity + delta;
                        if (newQ === 0) return null;
                        if (newQ <= item.stock) return { ...item, quantity: newQ };
                    }
                    return item;
                }).filter(Boolean));
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const cartItemsCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            const renderStoreFront = () => (
                <div className="min-h-screen bg-gray-50 font-sans pb-24" dir="rtl">
                    <nav className="bg-white shadow-sm sticky top-0 z-40 border-b-2 border-[#cfa45d]">
                        <div className="container mx-auto px-4 h-16 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <span className="font-black text-2xl text-[#0f4c2e]">سمان <span className="text-[#cfa45d]">ههيا</span></span>
                            </div>
                            <button onClick={() => setIsCartOpen(true)} className="relative p-2 text-[#0f4c2e] hover:bg-green-50 rounded-full transition">
                                <ShoppingBag size={24} />
                                {cartItemsCount > 0 && (
                                    <span className="absolute top-0 right-0 bg-red-500 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full font-bold shadow-sm">
                                        {cartItemsCount}
                                    </span>
                                )}
                            </button>
                        </div>
                    </nav>

                    <header className="relative bg-[#0f4c2e] text-white overflow-hidden py-12 md:py-20 text-center">
                        <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                        <div className="container mx-auto px-4 relative z-10">
                            <span className="bg-white text-[#0f4c2e] px-5 py-1.5 rounded-full text-xs font-black mb-4 inline-block shadow-sm">
                                تربية بيتي - نظافة وجودة 👑
                            </span>
                            <h2 className="text-4xl md:text-5xl font-black mb-4">سمان متربي من أول الكتكوت<br/>لحد سفرتك</h2>
                            <p className="text-sm md:text-base text-green-100 max-w-xl mx-auto mb-6 font-bold">
                                نضمن لك أعلى معايير النظافة، تغليف آمن، وأوزان دقيقة لتجربة صحية لا تُنسى.
                            </p>
                        </div>
                    </header>

                    <section className="py-8 bg-white border-b border-gray-200">
                        <div className="container mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                            <div className="p-3 bg-green-50 rounded-xl border border-green-100">
                                <ShieldCheck size={28} className="mx-auto mb-2 text-[#cfa45d]" />
                                <h3 className="font-bold text-[#0f4c2e] text-sm">تغليف آمن</h3>
                            </div>
                            <div className="p-3 bg-green-50 rounded-xl border border-green-100">
                                <Clock size={28} className="mx-auto mb-2 text-[#cfa45d]" />
                                <h3 className="font-bold text-[#0f4c2e] text-sm">تجهيز يومي</h3>
                            </div>
                            <div className="p-3 bg-green-50 rounded-xl border border-green-100">
                                <Star size={28} className="mx-auto mb-2 text-[#cfa45d]" />
                                <h3 className="font-bold text-[#0f4c2e] text-sm">اسمك عالطلب</h3>
                            </div>
                            <div className="p-3 bg-green-50 rounded-xl border border-green-100">
                                <CheckCircle size={28} className="mx-auto mb-2 text-[#cfa45d]" />
                                <h3 className="font-bold text-[#0f4c2e] text-sm">أوزان دقيقة</h3>
                            </div>
                        </div>
                    </section>

                    <section id="products" className="py-10">
                        <div className="container mx-auto px-4 max-w-5xl">
                            <h2 className="text-2xl font-black text-[#0f4c2e] mb-2 border-r-4 border-[#cfa45d] pr-3">قائمة المنتجات الطازجة</h2>
                            <p className="text-gray-500 text-sm font-bold mb-8">اختر الوزن اللي يناسبك، وإحنا هنجهزهولك فوراً</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                {products.map(product => (
                                    <div key={product.id} className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col relative h-[380px]">
                                        {product.isLimited && product.stock > 0 && (
                                            <span className="absolute top-3 right-3 bg-[#cfa45d] text-white text-[10px] font-black px-3 py-1 rounded-full shadow-sm z-10">الكمية محدودة 🔥</span>
                                        )}
                                        <div className="h-40 bg-gray-100 relative">
                                            <img src={product.image} alt={product.name} className="w-full h-full object-cover" onError={(e) => e.target.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\'><rect width=\'100%\' height=\'100%\' fill=\'%23f1f5f9\'/></svg>'} />
                                        </div>
                                        <div className="p-4 flex flex-col flex-1">
                                            <div className="flex justify-between items-start mb-1">
                                                <h3 className="text-lg font-black text-[#0f4c2e]">{product.name}</h3>
                                                <span className="font-black text-[#0f4c2e] text-xl">{product.price}<span className="text-[10px] text-gray-500 mr-1">ج.م</span></span>
                                            </div>
                                            <span className="bg-gray-50 text-gray-500 text-[10px] px-2 py-1 rounded border border-gray-200 font-bold self-start mb-2">⚖️ {product.weight}</span>
                                            <p className="text-gray-500 text-xs font-bold leading-relaxed flex-1">{product.description}</p>
                                            
                                            <div className="text-[10px] font-bold px-2 py-1 rounded border bg-green-50 text-green-700 w-fit mt-2 mb-3">المتاح: {product.stock}</div>

                                            <div className="flex gap-2 mt-auto">
                                                <button onClick={() => setQuickOrderProduct(product)} disabled={product.stock <= 0} className={`flex-1 py-2.5 rounded-xl font-black text-sm flex items-center justify-center gap-1 transition ${product.stock > 0 ? 'bg-[#cfa45d] text-white hover:bg-[#b58c49]' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                                    <Zap size={16} /> سريع
                                                </button>
                                                <button onClick={() => addToCart(product)} disabled={product.stock <= 0} className={`flex-1 py-2.5 rounded-xl font-black text-sm flex items-center justify-center gap-1 transition ${product.stock > 0 ? 'bg-[#0f4c2e] text-white hover:bg-[#0a3621]' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                                    <Plus size={16} /> للسلة
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* الشريط السفلي العائم */}
                    <div className={`fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-10px_20px_rgba(0,0,0,0.08)] p-4 flex justify-between items-center z-40 transform transition-transform duration-300 ${cartItemsCount > 0 ? 'translate-y-0' : 'translate-y-full'}`}>
                        <div className="flex flex-col">
                            <span className="text-xs text-gray-500 font-bold">الإجمالي (بدون التوصيل)</span>
                            <div className="font-black text-[#0f4c2e] text-2xl">{cartTotal} <span className="text-sm">ج.م</span></div>
                        </div>
                        <button onClick={() => setIsCartOpen(true)} className="bg-[#0f4c2e] text-white px-6 py-3 rounded-xl font-black flex items-center gap-3 shadow-lg hover:bg-gray-800 transition-colors">
                            <div className="relative">
                                <ShoppingBag size={20} className="text-[#cfa45d]" />
                                <span className="absolute -top-2 -right-2 bg-red-500 text-white w-5 h-5 flex items-center justify-center rounded-full text-xs shadow-sm">{cartItemsCount}</span>
                            </div>
                            عرض السلة
                        </button>
                    </div>

                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-[#0f4c2e]/60 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full sm:w-96 bg-gray-50 h-full shadow-2xl flex flex-col animate-in slide-in-from-left">
                                <div className="p-4 border-b border-gray-200 bg-white flex justify-between items-center shadow-sm">
                                    <h2 className="text-xl font-black text-[#0f4c2e] flex items-center gap-2">
                                        <ShoppingBag className="text-[#cfa45d]"/> السلة الحالية
                                    </h2>
                                    <button onClick={() => setIsCartOpen(false)} className="text-gray-400 hover:text-red-500 bg-gray-100 w-8 h-8 rounded-full flex items-center justify-center transition">
                                        <X size={20} />
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                    {cart.map(item => (
                                        <div key={item.id} className="bg-white p-3 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                                            <div className="flex-1">
                                                <h4 className="font-bold text-[#0f4c2e] text-sm mb-1">{item.name}</h4>
                                                <div className="text-[#cfa45d] font-black text-sm">{item.price} ج.م</div>
                                            </div>
                                            <div className="flex items-center gap-2 bg-gray-50 rounded-lg p-1 border border-gray-200 h-[36px]">
                                                <button onClick={() => updateQuantity(item.id, 1)} className="w-8 h-full bg-white text-[#0f4c2e] rounded shadow-sm font-black flex items-center justify-center"><Plus size={14}/></button>
                                                <span className="font-black text-[#0f4c2e] min-w-[20px] text-center text-sm">{item.quantity}</span>
                                                <button onClick={() => updateQuantity(item.id, -1)} className="w-8 h-full bg-white text-red-500 rounded shadow-sm font-black flex items-center justify-center"><Minus size={14}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="p-5 border-t border-gray-200 bg-white shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
                                    <div className="flex justify-between items-center mb-4 text-lg">
                                        <span className="font-black text-[#0f4c2e]">قيمة الطلبات:</span>
                                        <span className="font-black text-2xl text-[#0f4c2e]">{cartTotal} <span className="text-sm text-gray-500">ج.م</span></span>
                                    </div>
                                    <button onClick={() => { setIsCartOpen(false); setView('checkout'); }} className="w-full bg-[#0f4c2e] text-white py-4 rounded-xl font-black text-lg hover:bg-[#0a3621] shadow-lg transition flex justify-center items-center gap-2">
                                        تأكيد وإتمام الحجز
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {quickOrderProduct && (
                        <div className="fixed inset-0 z-[60] flex items-end md:items-center justify-center bg-[#0f4c2e]/80 backdrop-blur-sm md:p-4">
                            <div className="bg-white rounded-t-2xl md:rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in slide-in-from-bottom-10">
                                <div className="p-4 bg-gray-50 flex justify-between items-center border-b border-gray-200">
                                    <h3 className="font-black text-[#0f4c2e] flex items-center gap-2"><Zap size={20} className="text-[#cfa45d]"/> طلب سريع جداً</h3>
                                    <button onClick={() => setQuickOrderProduct(null)} className="text-gray-400 hover:text-red-500 bg-gray-100 w-8 h-8 rounded-full flex justify-center items-center"><X size={20} /></button>
                                </div>
                                <div className="p-5">
                                    <div className="flex items-center gap-3 mb-5 border border-[#cfa45d]/30 bg-orange-50/50 p-3 rounded-xl">
                                        <img src={quickOrderProduct.image} className="w-12 h-12 rounded object-cover border border-gray-200" />
                                        <div>
                                            <h4 className="font-black text-[#0f4c2e]">{quickOrderProduct.name}</h4>
                                            <p className="text-sm font-black text-[#cfa45d]">{quickOrderProduct.price} ج.م</p>
                                        </div>
                                    </div>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        const qty = e.target.qty.value; const phone = e.target.phone.value;
                                        const waText = `*طلب سريع* ⚡\n\nالمنتج: ${qty}x ${quickOrderProduct.name}\nالسعر: ${qty * quickOrderProduct.price} ج.م\nالرقم: ${phone}`;
                                        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waText)}`, '_blank');
                                        setQuickOrderProduct(null); showToast('جاري التحويل للواتساب...');
                                    }}>
                                        <div className="space-y-4">
                                            <div><label className="block text-xs font-black text-[#0f4c2e] mb-1">الكمية:</label><input name="qty" type="number" min="1" max={quickOrderProduct.stock} defaultValue="1" required className="w-full border-2 border-gray-200 rounded-xl p-2.5 font-bold outline-none focus:border-[#cfa45d]" /></div>
                                            <div><label className="block text-xs font-black text-[#0f4c2e] mb-1">الموبايل:</label><input name="phone" type="tel" required placeholder="01XXXXXXXXX" className="w-full border-2 border-gray-200 rounded-xl p-2.5 font-bold outline-none focus:border-[#cfa45d] tracking-widest text-left" dir="ltr" /></div>
                                            <button type="submit" className="w-full bg-[#cfa45d] hover:bg-[#b58c49] text-white py-3.5 rounded-xl font-black transition shadow-md flex justify-center items-center gap-2 mt-2"><Phone size={18} /> إرسال للواتساب</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            const renderCheckoutView = () => {
                const [custType, setCustType] = useState('new');
                const [isSubmitting, setIsSubmitting] = useState(false);

                const handleFinalOrder = async (e) => {
                    e.preventDefault();
                    setIsSubmitting(true);
                    const form = e.target;
                    
                    const name = custType === 'new' ? form.customerName.value : "عميل سابق";
                    const phone = form.phone.value;
                    const regionId = form.region.value;
                    const address = custType === 'new' ? form.address.value : "مُسجل مسبقاً";
                    
                    const selectedZone = deliveryZones.find(z => z.id === regionId);
                    const zoneName = selectedZone ? selectedZone.name : 'غير محدد';
                    const deliveryFee = selectedZone ? selectedZone.price : 0;
                    
                    const finalTotal = cartTotal + deliveryFee;

                    // تجهيز رسالة التيك تيك (TickTick) عبر Webhooks - تماماً كما في النظام القديم
                    let tickTickItemsStr = "";
                    cart.forEach(item => { tickTickItemsStr += `[ ${item.quantity} ] ${item.name} = ${item.quantity * item.price} ج.م\n`; });
                    
                    const orderDate = new Date().toLocaleDateString('ar-EG');
                    const orderTime = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

                    const orderDetailsForTickTick = `🧾 **تفاصيل الأوردر:**
👤 الاسم: ${name}
📱 الموبايل: ${phone}
📍 المنطقة: ${zoneName}
🏠 العنوان: ${address}
🕒 الوقت: ${orderDate} - ${orderTime}
--------------------------------
🛒 الطلبات:
${tickTickItemsStr}--------------------------------
📦 قيمة الطلبات: ${cartTotal} ج.م
🚚 رسوم التوصيل: ${deliveryFee === 0 ? 'يحدد لاحقاً' : deliveryFee + ' ج.م'}
💰 الإجمالي النهائي: ${finalTotal} ج.م
${custType === 'new' ? '#عميل_جديد' : '#عميل_سابق'}`;

                    try {
                        // إرسال البيانات للويب هوك (TickTick / Make.com)
                        await fetch('https://api.web3forms.com/submit', { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, 
                            body: JSON.stringify({ 
                                access_key: WEB3FORMS_ACCESS_KEY, 
                                subject: `🛒 طلب من ${name} - ${zoneName}`, 
                                "التفاصيل": orderDetailsForTickTick 
                            }) 
                        });
                    } catch(err) {
                        console.log("Webhook error", err);
                    }

                    // تجهيز رسالة الواتساب
                    let waItemsStr = "";
                    cart.forEach(item => { waItemsStr += `▪️ ${item.quantity} × ${item.name} = ${item.quantity * item.price} ج\n`; });
                    
                    const waText = `السلام عليكم، أريد تأكيد حجزي:

📋 *بيانات العميل:*
${custType === 'new' ? '👤 الاسم: ' + name : '🔁 عميل سابق'}
📱 الموبايل: ${phone}
📍 المنطقة: ${zoneName}

🛒 *الطلبات:*
${waItemsStr}═════════════════
📦 الطلبات: ${cartTotal} ج
🚚 التوصيل: ${deliveryFee === 0 ? 'يحدد لاحقاً' : deliveryFee + ' ج'}
💰 *الإجمالي: ${finalTotal} ج.م*`;

                    setCart([]);
                    localStorage.removeItem('sman_new_cart');
                    setIsSubmitting(false);
                    
                    showToast('تم التسجيل، جاري تحويلك للواتساب للتأكيد...');
                    setTimeout(() => {
                        window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waText)}`;
                    }, 1000);
                };

                return (
                    <div className="min-h-screen bg-gray-50 py-8 font-sans pb-20" dir="rtl">
                        <div className="container mx-auto px-4 max-w-lg">
                            <div className="flex items-center gap-3 mb-6">
                                <button onClick={() => setView('store')} className="bg-white w-10 h-10 rounded-full flex justify-center items-center shadow-sm border border-gray-200 text-[#0f4c2e]"><X size={20}/></button>
                                <h2 className="text-xl font-black text-[#0f4c2e]">إتمام الحجز</h2>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
                                <div className="flex gap-2 mb-6 bg-gray-100/80 p-1.5 rounded-2xl border border-gray-200">
                                    <button type="button" onClick={() => setCustType('new')} className={`flex-1 py-3 rounded-xl text-sm font-black transition-all ${custType === 'new' ? 'bg-white text-[#0f4c2e] shadow-sm border border-gray-200/50' : 'text-gray-500'}`}>أول مرة تطلب؟ 😍</button>
                                    <button type="button" onClick={() => setCustType('old')} className={`flex-1 py-3 rounded-xl text-sm font-black transition-all ${custType === 'old' ? 'bg-white text-[#0f4c2e] shadow-sm border border-gray-200/50' : 'text-gray-500'}`}>طلبت قبل كده؟ 😎</button>
                                </div>

                                <form onSubmit={handleFinalOrder} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-black text-[#0f4c2e] mb-1.5">منطقة التوصيل <span className="text-red-500">*</span></label>
                                        <select name="region" required className="w-full border-2 border-gray-200 rounded-xl p-3 font-bold text-[#0f4c2e] outline-none focus:border-[#cfa45d] bg-gray-50">
                                            <option value="">اختر منطقتك...</option>
                                            {deliveryZones.map(z => <option key={z.id} value={z.id}>{z.name} {z.price > 0 ? `(${z.price} ج)` : '(يحدد لاحقاً)'}</option>)}
                                        </select>
                                    </div>

                                    {custType === 'new' && (
                                        <>
                                            <div>
                                                <label className="block text-sm font-black text-[#0f4c2e] mb-1.5">اسم حضرتك <span className="text-red-500">*</span></label>
                                                <input name="customerName" required type="text" className="w-full border-2 border-gray-200 rounded-xl p-3 font-bold text-[#0f4c2e] outline-none focus:border-[#cfa45d] bg-gray-50" placeholder="الاسم ثلاثي" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-black text-[#0f4c2e] mb-1.5">العنوان بالتفصيل</label>
                                                <input name="address" type="text" className="w-full border-2 border-gray-200 rounded-xl p-3 font-bold text-[#0f4c2e] outline-none focus:border-[#cfa45d] bg-gray-50" placeholder="اسم الشارع، علامة مميزة..." />
                                            </div>
                                        </>
                                    )}

                                    <div>
                                        <label className="block text-sm font-black text-[#0f4c2e] mb-1.5">{custType === 'old' ? 'الرقم المسجل' : 'رقم الموبايل'} <span className="text-red-500">*</span></label>
                                        <input name="phone" required type="tel" className="w-full border-2 border-gray-200 rounded-xl p-3 font-black text-[#0f4c2e] outline-none focus:border-[#cfa45d] bg-gray-50 tracking-widest text-left" dir="ltr" placeholder="01XXXXXXXXX" />
                                    </div>

                                    {custType === 'old' && (
                                        <div className="bg-[#cfa45d]/10 border border-[#cfa45d]/30 rounded-xl p-3 text-xs font-black text-[#0f4c2e] flex items-center gap-2">
                                            <Zap size={16} className="text-[#cfa45d]" />
                                            <span>اكتب رقمك المسجل، والأوردر هيتم تأكيده في السيستم فوراً!</span>
                                        </div>
                                    )}

                                    <div className="bg-green-50/50 rounded-xl p-4 mt-6 border border-green-100">
                                        <div className="flex justify-between text-gray-600 text-sm font-bold mb-2"><span>قيمة الطلبات:</span><span>{cartTotal} ج.م</span></div>
                                        <div className="flex justify-between items-center text-lg mt-3 pt-3 border-t border-green-200">
                                            <span className="font-black text-[#0f4c2e]">الإجمالي المبدئي:</span>
                                            <span className="font-black text-2xl text-[#0f4c2e]">{cartTotal} <span className="text-sm text-gray-500">ج.م</span></span>
                                        </div>
                                        <p className="text-[10px] text-gray-500 text-center mt-2">(غير شامل التوصيل)</p>
                                    </div>

                                    <button type="submit" disabled={isSubmitting} className="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl font-black text-lg transition-all shadow-lg flex justify-center items-center gap-2 mt-4 disabled:opacity-70">
                                        {isSubmitting ? 'جاري الإرسال للتيك تيك...' : <><Phone size={20} /> تأكيد وإرسال عبر واتساب</>}
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <>
                    {view === 'checkout' ? renderCheckoutView() : renderStoreFront()}
                    
                    {toast.show && (
                        <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-[70] px-6 py-3 rounded-full shadow-lg font-bold text-white flex items-center gap-2 transition-all ${toast.type === 'error' ? 'bg-red-500' : 'bg-[#0f4c2e]'}`}>
                            {toast.type === 'error' ? <AlertCircle size={18} /> : <CheckCircle size={18} />}
                            <span className="text-sm">{toast.message}</span>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
